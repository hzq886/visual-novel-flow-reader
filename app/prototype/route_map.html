<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>催眠4 — 全ルート・分岐マップ（ノードエディタ）</title>
<style>
  :root{
    --bg:#13161c; --grid:#222834; --panel:#1b202a; --panel2:#222936;
    --line:#3a4252; --txt:#e7ecf3; --dim:#8b97a8;
    --common:#7b8696; --ayan:#e07a93; --suzu:#6f93e0; --tuba:#3fb6ad;
    --mako:#b08ae8; --kaede:#e0a94f; --branch:#e9c07a; --end:#ffd166; --omake:#5d6571;
  }
  *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:"PingFang SC","Source Han Sans SC",system-ui,-apple-system,sans-serif;}
  /* ── キャンバス（ドットグリッド） ── */
  #canvas{position:absolute;inset:0;overflow:hidden;cursor:grab;
    background-color:var(--bg);
    background-image:radial-gradient(var(--grid) 1.2px,transparent 1.3px);
    background-size:26px 26px;}
  #canvas.grab{cursor:grabbing;}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;width:1px;height:1px;}
  #edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}

  /* ── ノード ── */
  .node{position:absolute;width:200px;border-radius:13px;cursor:grab;
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1.5px solid var(--nc,#3a4252);
    box-shadow:0 6px 22px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.04);
    padding:11px 13px 12px;transition:box-shadow .15s,transform .05s,border-color .15s;
    user-select:none;}
  .node:hover{box-shadow:0 10px 30px rgba(0,0,0,.6),0 0 0 1px var(--nc),0 0 22px -4px var(--nc);}
  .node.sel{box-shadow:0 10px 34px rgba(0,0,0,.6),0 0 0 2px var(--nc),0 0 30px -2px var(--nc);}
  /* 現在ゲーム進行中ノード（ストーリーと同期して縁が発光） */
  @keyframes liveglow{
    0%,100%{box-shadow:0 0 0 2.5px #ffd166,0 0 26px 2px rgba(255,209,102,.55),0 8px 26px rgba(0,0,0,.5);}
    50%{box-shadow:0 0 0 3.5px #ffe6a6,0 0 46px 8px rgba(255,209,102,.9),0 8px 26px rgba(0,0,0,.5);}}
  .node.live{animation:liveglow 1.5s ease-in-out infinite;border-color:#ffe6a6 !important;z-index:45;}
  .node.live .ttl{color:#fff3d6;}
  /* 個別シーン子ノードの発光 */
  @keyframes kidglow{
    0%,100%{box-shadow:0 0 0 1.5px #ffd166,0 0 14px 1px rgba(255,209,102,.6);}
    50%{box-shadow:0 0 0 2px #ffe6a6,0 0 24px 5px rgba(255,209,102,.95);}}
  .kid.live{animation:kidglow 1.4s ease-in-out infinite;border-color:#ffe6a6 !important;
    background:linear-gradient(180deg,#33301f,#2a2718) !important;}
  .kid.live .kl{color:#fff3d6;}
  .kid.live .kn{box-shadow:0 0 9px rgba(255,209,102,.85);}
  .node.drag{cursor:grabbing;z-index:50;}
  .node .hd{display:flex;align-items:center;gap:8px;}
  .node .ico{width:22px;height:22px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;
    font-size:12px;font-weight:700;color:#11141a;background:var(--nc);}
  .node .ttl{font-size:13.5px;font-weight:700;letter-spacing:.02em;line-height:1.25;}
  .node .sub{margin-top:6px;font-size:11px;line-height:1.45;color:var(--dim);}
  .node .cnt{margin-top:8px;display:inline-flex;align-items:center;gap:5px;font-size:10.5px;
    color:var(--nc);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
    padding:2px 8px;border-radius:20px;font-weight:600;}
  /* ノード種別 */
  .node.start{border-radius:30px;width:130px;text-align:center;}
  .node.branch{border-style:dashed;background:linear-gradient(180deg,#2a2618,#221f14);}
  .node.branch .ico{clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);border-radius:0;}
  .node.end{background:linear-gradient(180deg,#2c2716,#241f11);}
  .node.end .ttl{color:#ffe9a8;}
  .node.omake{opacity:.82;}
  /* ポート */
  .port{position:absolute;width:11px;height:11px;border-radius:50%;top:var(--py,30px);
    background:#11141a;border:2px solid var(--nc);z-index:2;}
  .port.in{left:-6px;}
  .port.out{right:-6px;background:var(--nc);}

  /* ── グループ（展開＝入れ子サブフロー） ── */
  .node.group{width:470px;padding:0;background:linear-gradient(180deg,#1b2230,#161b24);border-color:#3d4a60;}
  .node.group .port{top:50%;transform:translateY(-50%);}
  .ghead{display:flex;align-items:center;gap:9px;padding:12px 13px;border-bottom:1px solid #2a3242;position:relative;}
  .ghead .ttl{font-size:14px;font-weight:700;}
  .ghead .gtag{font-size:10.5px;color:var(--dim);margin-left:2px;}
  .gbody{display:flex;gap:14px;padding:14px;align-items:flex-start;}
  .subgroup{flex:1;min-width:0;background:rgba(255,255,255,.025);border:1.4px dashed var(--sg,#6f93e0);
    border-radius:11px;padding:10px 9px 11px;}
  .sgtitle{font-size:11.5px;font-weight:700;color:var(--sg);margin:1px 2px 10px;line-height:1.35;
    display:flex;align-items:center;gap:6px;}
  .sgtitle .badge{background:var(--sg);color:#11141a;border-radius:5px;padding:1px 6px;font-size:11px;}
  .kids{display:flex;flex-direction:column;gap:7px;}
  .kid{display:flex;align-items:center;gap:7px;background:linear-gradient(180deg,#222a37,#1d2430);
    border:1px solid #313b4b;border-left:3px solid var(--sg);border-radius:8px;padding:6px 8px;
    cursor:pointer;transition:.12s;}
  .kid:hover{background:#283143;border-color:var(--sg);transform:translateX(2px);}
  .kid .kn{width:16px;height:16px;border-radius:50%;background:var(--sg);color:#11141a;
    font-size:9.5px;font-weight:800;display:grid;place-items:center;flex:0 0 auto;}
  .kid .kc{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#9fb0c4;
    background:rgba(255,255,255,.05);padding:1px 5px;border-radius:4px;flex:0 0 auto;}
  .kid .kl{font-size:11.5px;color:#dde4ee;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .exp{margin:2px 13px 13px;display:block;width:calc(100% - 26px);background:#283142;border:1px solid #38445a;
    color:#cdd6e3;font-size:11px;font-weight:600;padding:6px;border-radius:8px;cursor:pointer;}
  .exp:hover{background:#313d52;border-color:var(--nc);color:#fff;}
  .gx{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:#283142;
    border:1px solid #38445a;color:#cdd6e3;font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;cursor:pointer;}
  .gx:hover{background:#313d52;color:#fff;}

  /* ── エッジ ── */
  .edge{fill:none;stroke-width:2.4;opacity:.62;transition:opacity .15s,stroke-width .15s;}
  .edge.hot{opacity:1;stroke-width:3.4;}
  .elabel{font-size:11px;font-weight:600;fill:#dfe6ef;
    paint-order:stroke;stroke:#0e1117;stroke-width:4px;stroke-linejoin:round;}

  /* ── HUD ── */
  #top{position:absolute;top:14px;left:16px;z-index:30;pointer-events:none;}
  #top h1{font-size:15px;letter-spacing:.04em;font-weight:700;
    text-shadow:0 2px 10px #000;}
  #top .s{font-size:11px;color:var(--dim);margin-top:2px;}
  #legend{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:30;
    display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:62vw;
    background:rgba(20,24,31,.7);backdrop-filter:blur(7px);border:1px solid #2a313e;
    padding:7px 11px;border-radius:12px;}
  #legend span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);}
  #legend i{width:11px;height:11px;border-radius:4px;}
  #ctrl{position:absolute;bottom:16px;left:16px;z-index:30;display:flex;gap:6px;align-items:center;
    background:rgba(20,24,31,.78);backdrop-filter:blur(7px);border:1px solid #2a313e;
    padding:6px;border-radius:12px;}
  #ctrl button{background:#252c39;border:1px solid #333c4b;color:var(--txt);
    width:32px;height:32px;border-radius:8px;font-size:15px;cursor:pointer;display:grid;place-items:center;}
  #ctrl button:hover{background:#2e3747;border-color:#465064;}
  #ctrl button.wide{width:auto;padding:0 12px;font-size:12px;font-weight:600;}
  #zoom{font-size:11px;color:var(--dim);min-width:42px;text-align:center;}

  /* ── 詳細パネル ── */
  #panel{position:absolute;top:0;right:0;height:100%;width:330px;z-index:40;
    background:linear-gradient(180deg,#1a1f29,#161a22);border-left:1px solid #2a313e;
    box-shadow:-16px 0 40px rgba(0,0,0,.5);transform:translateX(100%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;}
  #panel.show{transform:none;}
  #panel .ph{padding:18px 18px 14px;border-bottom:1px solid #262d39;}
  #panel .pk{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.1em;
    padding:3px 9px;border-radius:6px;color:#11141a;background:var(--pc,#7b8696);}
  #panel h2{font-size:18px;margin-top:10px;line-height:1.3;}
  #panel .pdesc{font-size:12.5px;line-height:1.6;color:#c3ccd8;margin-top:9px;}
  #panel .pbody{padding:14px 18px;overflow:auto;flex:1;}
  #panel .plab{font-size:11px;color:var(--dim);letter-spacing:.08em;font-weight:600;
    text-transform:uppercase;margin:4px 0 9px;}
  #panel .scenes{display:flex;flex-wrap:wrap;gap:6px;}
  #panel .sc{font-size:10.5px;font-family:ui-monospace,Menlo,monospace;
    background:#222a36;border:1px solid #2f3947;color:#aeb9c8;padding:3px 7px;border-radius:6px;}
  #panel .close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;
    background:#252c39;border:1px solid #333c4b;color:var(--txt);cursor:pointer;font-size:15px;}
  #hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:25;
    font-size:11px;color:var(--dim);background:rgba(20,24,31,.6);padding:5px 12px;border-radius:20px;
    pointer-events:none;animation:fade 3s infinite;}
  @keyframes fade{0%,100%{opacity:.4}50%{opacity:.85}}
</style>
</head>
<body>
<div id="canvas">
  <div id="world">
    <svg id="edges"></svg>
    <!-- nodes injected -->
  </div>
</div>

<div id="top">
  <h1>催眠4 — 全ルート・分岐マップ</h1>

</div>

<div id="legend"></div>

<div id="ctrl">
  <button id="zout" title="縮小">−</button>
  <div id="zoom">100%</div>
  <button id="zin" title="拡大">＋</button>
  <button class="wide" id="fit" title="全体表示">全体表示</button>
  <button class="wide" id="reset" title="配置リセット">配置リセット</button>
</div>

<div id="hint">ドラッグで移動 · ホイールでズーム · ノードクリックで詳細</div>

<div id="panel">

  </div>
</div>

const DEF_H=78;
const byId={}; N.forEach(n=>{n.w=n.w||200;n.h=n.h||DEF_H;byId[n.id]=n;});
const world=document.getElementById('world'),svg=document.getElementById('edges'),
      canvas=document.getElementById('canvas');
const NS='http://www.w3.org/2000/svg';

// arrowheads（色別マーカー）
const defs=document.createElementNS(NS,'defs');
Object.entries(COL).forEach(([k,v])=>{
  const m=document.createElementNS(NS,'marker');
  m.setAttribute('id','arr-'+k);m.setAttribute('viewBox','0 0 10 10');
  m.setAttribute('refX','8.5');m.setAttribute('refY','5');m.setAttribute('markerWidth','7');
  m.setAttribute('markerHeight','7');m.setAttribute('orient','auto-start-reverse');
  const p=document.createElementNS(NS,'path');p.setAttribute('d','M0,0 L10,5 L0,10 z');
  p.setAttribute('fill',v);m.appendChild(p);defs.appendChild(m);
});
svg.appendChild(defs);

// ノードDOM生成
const nodeEls={};
function buildNodes(){
  N.forEach(n=>{
    const el=document.createElement('div');
    el.dataset.id=n.id;
    world.appendChild(el);
    nodeEls[n.id]=el;
    renderNodeInner(n);
    placeNode(n);
  });
}
function renderNodeInner(n){
  const el=nodeEls[n.id];
  el.className='node '+n.kind;
  el.style.setProperty('--nc',COL[n.c]);
  if(n.kind==='group'){el.innerHTML=groupHTML(n);return;}
  const py=(n.h/2-5)+'px';
  el.innerHTML=`
    <div class="port in"  style="--py:${py}"></div>
    <div class="port out" style="--py:${py}"></div>
    <div class="hd"><div class="ico">${n.ico}</div><div class="ttl">${n.t}</div></div>
    ${n.kind==='start'?'':`<div class="sub">${(n.d||'').slice(0,46)}…</div>`}
    ${n.kind==='start'?'':`<div class="cnt">▦ ${countScenes(n)} シーン</div>`}
    ${n.groups?`<button class="exp">⊞ 展開して内訳を見る（A/B）</button>`:''}`;
}
function groupHTML(n){
  return `<div class="port in"></div><div class="port out"></div>
   <div class="ghead"><div class="ico">${n.ico}</div>
     <div class="ttl">${n.t}<span class="gtag"> ＜2サブセットに展開＞</span></div>
     <button class="gx">⊟ 折りたたむ</button></div>
   <div class="gbody">${n.groups.map(g=>`
     <div class="subgroup" style="--sg:${g.tone}">
       <div class="sgtitle"><span class="badge">${g.key}</span>${g.title}</div>
       <div class="kids">${g.kids.map((k,i)=>`
         <div class="kid" data-code="${k.c}" data-label="${k.l}">
           <span class="kn">${i+1}</span>
           <span class="kc">${k.c.replace('001_PRO','')}</span>
           <span class="kl">${k.l}</span></div>`).join('')}
       </div></div>`).join('')}
   </div>`;
}
function countScenes(n){return n.sc.filter(s=>!s.startsWith('→')&&!s.startsWith('_')).length;}
function placeNode(n){const el=nodeEls[n.id];el.style.left=n.x+'px';el.style.top=n.y+'px';
  el.style.width=n.w+'px';el.style.minHeight=n.h+'px';}

// エッジ描画
const edgeEls=[];
function buildEdges(){
  E.forEach(e=>{
    const path=document.createElementNS(NS,'path');
    const col=COL[e[3]||'common'];
    path.setAttribute('class','edge');path.setAttribute('stroke',col);
    path.setAttribute('marker-end','url(#arr-'+(e[3]||'common')+')');
    svg.appendChild(path);
    let label=null;
    if(e[2]){
      label=document.createElementNS(NS,'text');
      label.setAttribute('class','elabel');label.setAttribute('text-anchor','middle');
      label.textContent=e[2];svg.appendChild(label);
    }
    edgeEls.push({e,path,label,col});
  });
}
function edgePath(a,b){
  const x1=a.x+a.w, y1=a.y+a.h/2, x2=b.x, y2=b.y+b.h/2;
  const dx=Math.max(48,Math.abs(x2-x1)*0.45);
  return {d:`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`,
          mx:(x1+x2)/2,my:(y1+y2)/2};
}
function drawEdges(){
  edgeEls.forEach(({e,path,label})=>{
    const a=byId[e[0]],b=byId[e[1]];const g=edgePath(a,b);
    path.setAttribute('d',g.d);
    if(label){label.setAttribute('x',g.mx);label.setAttribute('y',g.my-4);}
  });
}

// ───────────────────────── パン / ズーム ─────────────────────────
let panX=40,panY=20,zoom=1;
function applyView(){world.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom').textContent=Math.round(zoom*100)+'%';}
function zoomAt(cx,cy,factor){
  const nz=Math.min(2.2,Math.max(0.25,zoom*factor));
  const wx=(cx-panX)/zoom, wy=(cy-panY)/zoom;
  panX=cx-wx*nz; panY=cy-wy*nz; zoom=nz; applyView();
}
canvas.addEventListener('wheel',ev=>{ev.preventDefault();
  zoomAt(ev.clientX,ev.clientY, ev.deltaY<0?1.12:1/1.12);},{passive:false});

// パン（空白ドラッグ）＋ ノードドラッグ
let mode=null,sx,sy,opx,opy,dragNode=null,moved=false,downTarget=null;
canvas.addEventListener('pointerdown',ev=>{
  mode=null;
  if(ev.target.closest('.exp,.gx'))return;          // 展開ボタンはclickで処理
  const nodeEl=ev.target.closest('.node');
  if(ev.target.classList.contains('port'))return;
  moved=false;downTarget=ev.target;
  if(nodeEl){mode='node';dragNode=byId[nodeEl.dataset.id];
    sx=ev.clientX;sy=ev.clientY;opx=dragNode.x;opy=dragNode.y;
    nodeEl.classList.add('drag');
  }else{mode='pan';sx=ev.clientX;sy=ev.clientY;opx=panX;opy=panY;canvas.classList.add('grab');}
  canvas.setPointerCapture(ev.pointerId);
});
canvas.addEventListener('pointermove',ev=>{
  if(!mode)return;
  const dx=ev.clientX-sx,dy=ev.clientY-sy;
  if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
  if(mode==='pan'){panX=opx+dx;panY=opy+dy;applyView();}
  else if(mode==='node'){dragNode.x=opx+dx/zoom;dragNode.y=opy+dy/zoom;
    placeNode(dragNode);drawEdges();}
});
canvas.addEventListener('pointerup',ev=>{
  if(mode==='node'){nodeEls[dragNode.id].classList.remove('drag');
    if(!moved){
      const kid=downTarget&&downTarget.closest('.kid');
      if(kid)openKidPanel(kid.dataset.code,kid.dataset.label);
      else openPanel(dragNode);
    }}
  else if(mode==='pan'&&!moved)closePanel();
  mode=null;dragNode=null;canvas.classList.remove('grab');
});
// 展開トグル（ボタンclick）= クリックされたノードを対象に
world.addEventListener('click',ev=>{
  const b=ev.target.closest('.exp,.gx');
  if(b){ev.stopPropagation();const el=b.closest('.node');if(el)toggleGroup(el.dataset.id);}
});

// ───────────────────────── グループ展開／折りたたみ（任意ノード・同時1つ） ─────────────────────────
const GROUP_W=470;
let gExpandedId=null,gSaved=null;
function shiftFrom(baseX,dx,exceptId){
  N.forEach(n=>{if(n.id!==exceptId&&n.x>baseX){n.x+=dx;placeNode(n);}});
}
function expandGroup(id){
  const n=byId[id],el=nodeEls[id];if(!n.groups)return;
  gSaved={id,x:n.x,y:n.y,w:n.w,h:n.h,kind:n.kind};
  const cY=n.y+n.h/2;
  n.kind='group';n.w=GROUP_W;
  renderNodeInner(n);
  el.style.width=GROUP_W+'px';el.style.minHeight='';
  const h=el.offsetHeight;n.h=h;n.y=cY-h/2;
  placeNode(n);
  shiftFrom(gSaved.x,GROUP_W-gSaved.w,id);
  gExpandedId=id;
}
function collapseCurrent(){
  if(!gExpandedId)return;
  const n=byId[gExpandedId];
  shiftFrom(gSaved.x,gSaved.w-GROUP_W,gExpandedId);
  Object.assign(n,{x:gSaved.x,y:gSaved.y,w:gSaved.w,h:gSaved.h,kind:gSaved.kind});
  renderNodeInner(n);placeNode(n);
  gExpandedId=null;gSaved=null;
}
function toggleGroup(id){
  if(gExpandedId===id)collapseCurrent();
  else{if(gExpandedId)collapseCurrent();expandGroup(id);}
  drawEdges();fitView();
}

  document.getElementById('pkind').textContent='個別シーン';

  document.getElementById('pdesc').textContent='プロローグ内の単一シーンファイル（md_scr_text/'+code+'.txt）。';
  document.getElementById('pscnt').textContent='（1）';
  const box=document.getElementById('pscenes');box.innerHTML='';
  const c=document.createElement('span');c.className='sc';c.textContent=code;box.appendChild(c);
  panel.classList.add('show');
  // 子ノード（個別シーン）を手動選択 → 親へコード通知（Tab復帰でゲーム同期）
  if(window.parent!==window && window.parent.onNodePick){try{window.parent.onNodePick(code);}catch(e){}}
}

const panel=document.getElementById('panel');

function openPanel(n){
  document.querySelectorAll('.node.sel').forEach(e=>e.classList.remove('sel'));
  nodeEls[n.id].classList.add('sel');
  document.getElementById('pkind').textContent=KIND[n.kind]||n.kind;
  document.getElementById('pkind').style.setProperty('--pc',COL[n.c]);

  document.getElementById('pdesc').textContent=n.d||'';
  document.getElementById('pscnt').textContent='（'+countScenes(n)+'）';
  const box=document.getElementById('pscenes');box.innerHTML='';
  n.sc.forEach(s=>{const c=document.createElement('span');c.className='sc';c.textContent=s;
    if(s.startsWith('→'))c.style.color=COL.end;box.appendChild(c);});
  panel.classList.add('show');
  highlightEdges(n.id);
  // 手動でノードを選んだことを親フレームへ通知（Tab復帰時にゲームを同期）
  if(window.parent!==window && window.parent.onNodePick){try{window.parent.onNodePick(n.id);}catch(e){}}
}
function closePanel(){panel.classList.remove('show');
  document.querySelectorAll('.node.sel').forEach(e=>e.classList.remove('sel'));
  edgeEls.forEach(o=>o.path.classList.remove('hot'));}
document.getElementById('pclose').onclick=closePanel;
function highlightEdges(id){edgeEls.forEach(o=>{
  o.path.classList.toggle('hot', o.e[0]===id||o.e[1]===id);});}

// ───────────────────────── ビュー操作 ─────────────────────────
function fitView(){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  N.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);
    maxx=Math.max(maxx,n.x+n.w);maxy=Math.max(maxy,n.y+n.h);});
  const pad=80,W=innerWidth,H=innerHeight;
  const zw=W/(maxx-minx+pad*2),zh=H/(maxy-miny+pad*2);
  zoom=Math.min(1.1,Math.min(zw,zh));
  panX=(W-(maxx-minx)*zoom)/2-minx*zoom;
  panY=(H-(maxy-miny)*zoom)/2-miny*zoom+10;
  applyView();
}
const INIT=N.map(n=>({id:n.id,x:n.x,y:n.y}));
document.getElementById('fit').onclick=fitView;
document.getElementById('zin').onclick=()=>zoomAt(innerWidth/2,innerHeight/2,1.18);
document.getElementById('zout').onclick=()=>zoomAt(innerWidth/2,innerHeight/2,1/1.18);

  if(gExpandedId)collapseCurrent();
  if(typeof clearLive==='function')clearLive();
  INIT.forEach(p=>{byId[p.id].x=p.x;byId[p.id].y=p.y;placeNode(byId[p.id]);});
  drawEdges();fitView();closePanel();};

// 凡例
const LG=[['common','共通'],['ayan','綾菜'],['suzu','涼菜'],['tuba','翼'],
  ['mako','真琴'],['kaede','楓/合流'],['branch','分岐'],['end','エンド']];
document.getElementById('legend').innerHTML=LG.map(([k,v])=>
  `<span><i style="background:${COL[k]}"></i>${v}</span>`).join('');

// ───────────────────────── 親フレーム連携API ─────────────────────────
// コード→所属アーク特定（groupsのkid優先、なければsc配列）
function findOwner(code){
  for(const n of N){if(n.groups){for(const g of n.groups){if(g.kids.some(k=>k.c===code))return n.id;}}}
  for(const n of N){if(n.sc&&n.sc.includes(code))return n.id;}
  return null;
}
let liveNodeId=null,liveKidEl=null;
function clearLive(){
  if(liveNodeId&&nodeEls[liveNodeId])nodeEls[liveNodeId].classList.remove('live');
  if(liveKidEl)liveKidEl.classList.remove('live');
  liveNodeId=null;liveKidEl=null;
}
// id=ノードidでも 個別シーンコード(001_PRO001A等)でも受ける
window.highlightNode=function(code){
  let nodeId=code,kidCode=null;
  if(!byId[code]){const o=findOwner(code);if(!o)return;nodeId=o;kidCode=code;}
  const n=byId[nodeId];
  // 個別シーン & groups持ち → そのアークを自動展開してkidを発光
  if(kidCode&&n.groups&&gExpandedId!==nodeId){
    if(gExpandedId)collapseCurrent();
    expandGroup(nodeId);drawEdges();
  }
  clearLive();
  const el=nodeEls[nodeId];el.classList.add('live');liveNodeId=nodeId;
  let cx=n.x+n.w/2,cy=n.y+n.h/2;
  if(kidCode){
    const k=el.querySelector('.kid[data-code="'+kidCode+'"]');
    if(k){k.classList.add('live');liveKidEl=k;
      cx=n.x+k.offsetLeft+k.offsetWidth/2;cy=n.y+k.offsetTop+k.offsetHeight/2;}
  }
  panX=innerWidth/2-cx*zoom;panY=innerHeight/2-cy*zoom;applyView();
};
window.getLiveNode=function(){return liveKidEl?liveKidEl.dataset.code:liveNodeId;};
window.selectNode=function(id){const n=byId[id];if(n)openPanel(n);};
// Tabでストーリー画面へ戻る
document.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();if(window.parent!==window&&window.parent.toggleView)window.parent.toggleView();}
});

// 初期化
buildNodes();buildEdges();drawEdges();fitView();
</script>
