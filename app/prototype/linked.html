<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>催眠4 — ストーリー⇄ノード図 連動</title>
<style>
  *{margin:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#000;
    font-family:"PingFang SC","Source Han Sans SC",system-ui,sans-serif;}
  .frame{position:absolute;inset:0;width:100%;height:100%;border:0;
    transition:opacity .4s ease;}
  /* 既定＝ストーリー前面 */
  #nm{opacity:0;pointer-events:none;}
  #pb{opacity:1;}
  body.map #nm{opacity:1;pointer-events:auto;}
  body.map #pb{opacity:0;pointer-events:none;}

  /* 切替トグル */
  #bar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:20;
    display:flex;gap:3px;background:rgba(20,24,31,.82);backdrop-filter:blur(10px);
    border:1px solid #2a313e;border-radius:30px;padding:4px;
    box-shadow:0 8px 26px rgba(0,0,0,.5);}
  #bar button{background:none;border:0;color:#8b97a8;padding:7px 18px;border-radius:24px;
    cursor:pointer;font-weight:700;font-size:12.5px;letter-spacing:.03em;transition:.2s;}
  #bar button.on{background:linear-gradient(180deg,#f0cb86,#e3b46a);color:#181208;
    box-shadow:0 2px 8px rgba(233,192,122,.4);}
  #bar button:not(.on):hover{color:#e7ecf3;}

  #kbd{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:20;
    color:#9aa6b6;font-size:11.5px;background:rgba(20,24,31,.72);backdrop-filter:blur(8px);
    padding:6px 14px;border-radius:20px;border:1px solid #232a36;}
  #kbd kbd{background:#2a313e;border:1px solid #3a4252;border-radius:5px;padding:1px 7px;
    color:#e7ecf3;font-family:ui-monospace,Menlo,monospace;font-size:11px;margin:0 2px;}
  #kbd b{color:#e9c07a;}

  /* 同期トースト */
  #toast{position:absolute;top:60px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:21;
    opacity:0;pointer-events:none;background:rgba(18,22,28,.9);border:1px solid #3a4252;
    color:#e7ecf3;font-size:12px;padding:7px 16px;border-radius:20px;transition:.3s;
    box-shadow:0 6px 20px rgba(0,0,0,.5);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast b{color:#ffd166;}
</style>
</head>
<body class="story">
  <iframe id="nm" class="frame" src="route_map.html"></iframe>
  <iframe id="pb" class="frame" src="picturebook_v3.html"></iframe>

  <div id="bar">
    <button id="b-pb" class="on">▶ ストーリー</button>
    <button id="b-nm">⊞ ノード図</button>
  </div>
  <div id="toast"></div>
  <div id="kbd"><kbd>Tab</kbd> で <b>ストーリー ⇄ ノード図</b> を切替　·　現在のシーンがノード図で発光・双方向同期（2シーン デモ）</div>

<script>
  // シーンID = 個別シーンコード（ノード図のkidと一致）。デモ対象3シーン
  const SCENE_NAME={
    '001_PRO001A':'PRO001A 幼少回想・三人',
    '001_PRO001B':'PRO001B 幼少回想・楠木翼',
    '002_AYAN001A':'AYAN001A 綾菜・カフェ',
  };
  let view='pb', currentScene='001_PRO001A', pendingPick=null;

  const pbWin=()=>document.getElementById('pb').contentWindow;
  const nmWin=()=>document.getElementById('nm').contentWindow;
  const toastEl=document.getElementById('toast');
  let toastT=null;
  function toast(html){toastEl.innerHTML=html;toastEl.classList.add('show');
    clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1800);}

  function setBtn(){
    document.getElementById('b-pb').classList.toggle('on',view==='pb');
    document.getElementById('b-nm').classList.toggle('on',view==='nm');
  }
  function showMap(){
    view='nm';document.body.classList.add('map');setBtn();
    try{nmWin().highlightNode(currentScene);}catch(e){}
    toast(`現在地：<b>${SCENE_NAME[currentScene]||currentScene}</b>　発光ノードが今のシーン`);
  }
  function showStory(){
    view='pb';document.body.classList.remove('map');setBtn();
    if(pendingPick){
      let ok=false;try{ok=pbWin().gotoScene(pendingPick);}catch(e){}
      if(ok){currentScene=pendingPick;toast(`ノード選択を反映 → <b>${SCENE_NAME[pendingPick]||pendingPick}</b> へジャンプ`);}
      pendingPick=null;
    }
  }
  window.toggleView=function(){ view==='pb'?showMap():showStory(); };

  // picturebook → ノード図：ストーリーが次シーンへ進むたびに発光ノードを同期
  window.onSceneFromPB=function(sc){
    if(!sc)return;
    currentScene=sc;
    try{nmWin().highlightNode(sc);}catch(e){}
  };
  // ノード図 → picturebook：ノードを手動選択したら記録（Tab復帰でジャンプ）
  window.onNodePick=function(id){
    pendingPick=id;
    if(SCENE_NAME[id]) toast(`<b>${SCENE_NAME[id]}</b> を選択　·　<kbd style="font-size:10px">Tab</kbd> でゲームへ反映`);
  };

  document.getElementById('b-pb').onclick=showStory;
  document.getElementById('b-nm').onclick=showMap;
  // フォーカスが親にあるときのTab（iframe内フォーカス時は各iframeが処理）
  window.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();toggleView();}});

  setBtn();
</script>
</body>
</html>
